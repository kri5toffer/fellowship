  <rect width="32" height="32" rx="6" fill="#FCB400"/>
  <!-- Top-left quadrant -->
  <rect x="6" y="6" width="9" height="9" rx="1.5" fill="#18BFFF"/>
  <!-- Top-right quadrant -->
  <rect x="17" y="6" width="9" height="9" rx="1.5" fill="#FF6F2C"/>
  <!-- Bottom-left quadrant -->
  <rect x="6" y="17" width="9" height="9" rx="1.5" fill="#F82B60"/>
  <!-- Bottom-right quadrant -->
  <rect x="17" y="17" width="9" height="9" rx="1.5" fill="#7C39ED"/>
</svg>
